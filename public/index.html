<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Efficiency Report — iC group Dashboard</title>
    <meta name="robots" content="noindex,nofollow,noarchive" />
    
    <!-- Google Fonts: Montserrat -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
      :root {
        color-scheme: light;
        --bg: #fdfefe;
        --surface: #ffffff;
        --text-dark: #1a1a1a;
        --text-muted: #777777;
        --brand-green: #8ac43f;
        --brand-green-hover: #7cb342;
        --brand-green-light: rgba(138, 196, 63, 0.1);
        --brand-black: #1a1a1a;
        --border-color: rgba(233, 235, 232, 0.8);
        --shadow-soft: 0 8px 30px rgba(0, 0, 0, 0.02);
        --shadow-hover: 0 16px 40px rgba(0, 0, 0, 0.06);
      }

      * { 
        box-sizing: border-box; 
      }
      
      body {
        margin: 0;
        font-family: 'Montserrat', "Segoe UI", Arial, sans-serif;
        background-color: var(--bg);
        color: var(--text-dark);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        padding-bottom: 60px;
      }

      .wrap {
        max-width: 1600px;
        margin: 0 auto;
        padding: 0 32px;
      }

      /* Floating Header for TV */
      .navbar {
        position: sticky;
        top: 24px;
        z-index: 100;
        margin: 24px auto 48px;
      }
      
      .navbar-container {
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid var(--border-color);
        border-radius: 9999px;
        padding: 14px 48px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        box-shadow: var(--shadow-soft);
      }

      /* iC group Logo */
      .logo-wrap {
        text-decoration: none;
        display: flex;
      }
      
      .logo {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        line-height: 0.85;
      }
      
      .logo-ic {
        color: var(--brand-green);
        font-size: 30px;
        font-weight: 900;
        position: relative;
        letter-spacing: -0.5px;
      }
      
      .logo-ic .leaf {
        position: absolute;
        top: -4px;
        right: -6px;
        width: 8px;
        height: 8px;
        background: #e53935;
        border-radius: 50% 0 50% 50%;
        transform: rotate(-15deg);
      }
      
      .logo-group {
        color: #4b6584;
        font-size: 11px;
        font-weight: 700;
        text-transform: lowercase;
        letter-spacing: 0.5px;
        margin-top: 2px;
      }

      .nav-links {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      
      .nav-link {
        font-size: 12px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        padding: 8px 24px;
        border-radius: 9999px;
        text-decoration: none;
        color: var(--text-dark);
      }
      
      .nav-link.active {
        background: var(--brand-black);
        color: #ffffff;
      }
      
      .header-meta {
        display: flex;
        gap: 32px;
      }
      
      .meta-item {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
      }
      
      .meta-label {
        color: var(--text-muted);
        font-weight: 700;
        text-transform: uppercase;
        font-size: 10px;
        letter-spacing: 0.8px;
      }
      
      .meta-val {
        color: var(--text-dark);
        font-weight: 800;
        font-size: 15px;
        margin-top: 2px;
      }

      /* Hero Section */
      .hero {
        text-align: center;
        margin-bottom: 48px;
      }

      .page-title {
        font-size: clamp(38px, 6vw, 64px);
        font-weight: 900;
        color: var(--text-dark);
        margin: 0;
        letter-spacing: -1.5px;
        text-transform: uppercase;
      }

      .text-green {
        color: var(--brand-green);
      }

      /* Stats Cards Grid for TV (Locked 4 Columns) */
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 20px;
        margin-bottom: 48px;
      }
      
      .stat-card {
        background: var(--surface);
        border: 1px solid var(--border-color);
        border-radius: 28px;
        padding: 28px 32px;
        display: flex;
        align-items: center;
        gap: 24px;
        box-shadow: var(--shadow-soft);
      }
      
      .stat-icon-wrap {
        width: 60px;
        height: 60px;
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      
      .stat-icon {
        width: 28px;
        height: 28px;
      }
      
      .overdue-bg { background: #fee2e2; color: #ef4444; }
      .intime-bg { background: #dcfce7; color: #22c55e; }
      .closed-late-bg { background: #ffedd5; color: #f97316; }
      .closed-intime-bg { background: #e0f2fe; color: #3b82f6; }

      .stat-content {
        display: flex;
        flex-direction: column;
      }
      
      .stat-label {
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
        color: var(--text-muted);
        letter-spacing: 0.8px;
      }
      
      .stat-number {
        font-size: 44px;
        font-weight: 900;
        margin-top: 4px;
        line-height: 1;
        color: var(--text-dark);
      }

      /* Report/Table Container */
      .report-container {
        margin-bottom: 48px;
      }
      
      .error-panel {
        background: #fef2f2;
        border: 1px solid #fee2e2;
        color: #ef4444;
        border-radius: 24px;
        padding: 20px 32px;
        margin-bottom: 32px;
        font-weight: 700;
        font-size: 16px;
      }
      
      .loading-panel {
        background: var(--surface);
        border: 1px solid var(--border-color);
        border-radius: 28px;
        padding: 80px;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        color: var(--text-muted);
        font-weight: 700;
        box-shadow: var(--shadow-soft);
      }
      
      .spinner {
        width: 48px;
        height: 48px;
        border: 5px solid rgba(138, 196, 63, 0.15);
        border-top-color: var(--brand-green);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      .table-card {
        background: var(--surface);
        border: 1px solid var(--border-color);
        border-radius: 28px;
        overflow: hidden;
        box-shadow: var(--shadow-soft);
      }
      
      .table-scroller {
        overflow-x: auto;
      }
      
      table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0;
        font-size: 15px;
        text-align: left;
      }
      
      th {
        background: #fcfdfc;
        color: #555555;
        font-weight: 800;
        text-transform: uppercase;
        font-size: 12px;
        letter-spacing: 0.8px;
        padding: 24px 32px;
        border-bottom: 1px solid var(--border-color);
        position: sticky;
        top: 0;
        z-index: 10;
        white-space: nowrap;
      }
      
      td {
        padding: 20px 32px;
        border-bottom: 1px solid rgba(233, 235, 232, 0.6);
        color: #333333;
        vertical-align: middle;
        font-weight: 500;
        line-height: 1.4;
      }
      
      tr:last-child td {
        border-bottom: 0;
      }
      
      tbody tr:nth-child(even) {
        background-color: #fafbfa;
      }

      /* Bitrix Link */
      .task-link {
        color: var(--text-dark);
        text-decoration: none;
        font-weight: 800;
        border-bottom: 1.5px dashed rgba(26, 26, 26, 0.3);
        padding-bottom: 1px;
      }
      
      .task-link:hover {
        color: var(--brand-green);
        border-bottom-color: var(--brand-green);
      }

      /* Tree Grid Styles */
      .tree-row {
        user-select: none;
      }
      
      .tree-toggle {
        display: inline-block;
        width: 16px;
        font-size: 11px;
        margin-right: 10px;
        color: var(--text-muted);
        text-align: center;
      }
      
      .tree-level-1 {
        font-size: 16px;
      }
      
      .tree-level-2 {
        font-size: 15px;
      }
      
      .tree-level-3 {
        font-size: 14px;
      }
      
      .color-success {
        color: #16a34a !important;
        font-weight: 800;
      }
      
      .color-danger {
        color: #ef4444 !important;
        font-weight: 800;
      }

      /* Grid formatting on medium/small viewports */
      @media (max-width: 1024px) {
        .stats-grid { grid-template-columns: repeat(2, 1fr); }
      }

      @media (max-width: 640px) {
        .wrap { padding: 0 16px; }
        .stats-grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <!-- Floating Navigation Bar -->
      <header class="navbar">
        <div class="navbar-container">
          <a href="#" class="logo-wrap">
            <div class="logo">
              <div class="logo-ic">iC<span class="leaf"></span></div>
              <div class="logo-group">group</div>
            </div>
          </a>
          
          <nav class="nav-links">
            <span class="nav-link active">Отчет по задачам</span>
            <span style="font-size: 12px; font-weight: 700; color: var(--brand-green); margin-left: 12px;" id="host"></span>
          </nav>
          
          <div class="header-meta">
            <div class="meta-item">
              <span class="meta-label">Всего строк</span>
              <span id="rowCount" class="meta-val">0</span>
            </div>
            <div class="meta-item">
              <span class="meta-label">Обновлено</span>
              <span id="fetchedAt" class="meta-val">—</span>
            </div>
          </div>
        </div>
      </header>

      <!-- Main Title (Hero) -->
      <section class="hero">
        <h1 class="page-title">ОТЧЕТ <span class="text-green">ПО ЗАДАЧАМ</span></h1>
      </section>

      <!-- Stats Grid -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon-wrap overdue-bg">
            <svg class="stat-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
          </div>
          <div class="stat-content">
            <span class="stat-label">Открыта просрочена</span>
            <strong id="statOverdueOpen" class="stat-number">0</strong>
          </div>
        </div>
        
        <div class="stat-card">
          <div class="stat-icon-wrap intime-bg">
            <svg class="stat-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
          </div>
          <div class="stat-content">
            <span class="stat-label">Открыта в срок</span>
            <strong id="statOpenInTime" class="stat-number">0</strong>
          </div>
        </div>

        <div class="stat-card">
          <div class="stat-icon-wrap closed-late-bg">
            <svg class="stat-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
          </div>
          <div class="stat-content">
            <span class="stat-label">Закрыта с просрочкой</span>
            <strong id="statClosedLate" class="stat-number">0</strong>
          </div>
        </div>

        <div class="stat-card">
          <div class="stat-icon-wrap closed-intime-bg">
            <svg class="stat-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
          </div>
          <div class="stat-content">
            <span class="stat-label">Закрыта в срок</span>
            <strong id="statClosedInTime" class="stat-number">0</strong>
          </div>
        </div>
      </div>

      <!-- Report Table Section -->
      <div class="report-container">
        <div id="errorBox" class="error-panel" hidden></div>
        <div id="loadingBox" class="loading-panel">
          <div class="spinner"></div>
          <span>Синхронизация с базой данных…</span>
        </div>

        <div class="table-card" id="tableWrap" hidden>
          <div class="table-scroller">
            <table>
              <thead><tr id="tableHead"></tr></thead>
              <tbody id="tableBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <script>
      const state = {
        columns: [],
        rows: [],
        filteredRows: [],
        refreshTimer: null,
        refreshIntervalMs: 10 * 60 * 1000,
        portalHost: null,
        expandedNodes: new Set() // Keeps track of expanded node keys (e.g. "dept:1C")
      };

      const ids = {
        host: document.getElementById('host'),
        fetchedAt: document.getElementById('fetchedAt'),
        rowCount: document.getElementById('rowCount'),
        tableHead: document.getElementById('tableHead'),
        tableBody: document.getElementById('tableBody'),
        tableWrap: document.getElementById('tableWrap'),
        errorBox: document.getElementById('errorBox'),
        loadingBox: document.getElementById('loadingBox'),
        statOverdueOpen: document.getElementById('statOverdueOpen'),
        statOpenInTime: document.getElementById('statOpenInTime'),
        statClosedLate: document.getElementById('statClosedLate'),
        statClosedInTime: document.getElementById('statClosedInTime')
      };

      ids.host.textContent = window.location.host;

      function normalize(value) {
        return String(value ?? '').toLowerCase().trim();
      }

      function formatDate(value) {
        if (!value) return '—';
        const date = new Date(value);
        return Number.isNaN(date.getTime()) ? value : new Intl.DateTimeFormat('ru-RU', {
          dateStyle: 'short',
          timeStyle: 'medium'
        }).format(date);
      }

      function renderStats(rows) {
        const counts = {
          'Открыта просрочена': 0,
          'Открыта в срок': 0,
          'Закрыта с просрочкой': 0,
          'Закрыта в срок': 0
        };

        rows.forEach((row) => {
          const key = row['Состояние задачи'];
          if (Object.prototype.hasOwnProperty.call(counts, key)) {
            counts[key] += 1;
          }
        });

        ids.statOverdueOpen.textContent = counts['Открыта просрочена'];
        ids.statOpenInTime.textContent = counts['Открыта в срок'];
        ids.statClosedLate.textContent = counts['Закрыта с просрочкой'];
        ids.statClosedInTime.textContent = counts['Закрыта в срок'];
      }

      function renderTable() {
        const tree = {};
        
        // Group the rows dynamically on client-side
        state.filteredRows.forEach((row) => {
          const dept = row['Отдел'] || 'Без отдела';
          const assignee = row['Исполнитель'] || 'Без исполнителя';
          const taskTitle = row['Название задачи'] || 'Без названия';
          
          const overdue = parseInt(row['Просрочка, дней']) || 0;
          const efficiency = parseInt(row['Баллы эффективности']) || 0;
          
          if (!tree[dept]) {
            tree[dept] = { 
              name: dept, 
              overdueSum: 0, 
              efficiencySum: 0, 
              employees: {} 
            };
          }
          tree[dept].overdueSum += overdue;
          tree[dept].efficiencySum += efficiency;
          
          if (!tree[dept].employees[assignee]) {
            tree[dept].employees[assignee] = { 
              name: assignee, 
              overdueSum: 0, 
              efficiencySum: 0, 
              tasks: [] 
            };
          }
          tree[dept].employees[assignee].overdueSum += overdue;
          tree[dept].employees[assignee].efficiencySum += efficiency;
          
          tree[dept].employees[assignee].tasks.push({
            id: row['ID задачи'],
            title: taskTitle,
            overdue: overdue,
            efficiency: efficiency
          });
        });

        // Set columns headers
        const headers = ['Структура (Отдел → Исполнитель → Задача)', 'Просрочка, дней (Сумма)', 'Баллы эффективности (Сумма)'];
        ids.tableHead.innerHTML = headers.map(h => `<th>${h}</th>`).join('');
        
        let html = '';
        const depts = Object.keys(tree).sort();
        
        if (depts.length === 0) {
          ids.tableBody.innerHTML = `<tr><td colspan="3" style="text-align:center;color:var(--text-muted);padding:40px;">Нет данных для группировки</td></tr>`;
          return;
        }
        
        depts.forEach((deptName) => {
          const dept = tree[deptName];
          const deptKey = `dept:${deptName}`;
          const isDeptExpanded = state.expandedNodes.has(deptKey);
          const deptIcon = isDeptExpanded ? '▼' : '▶';
          
          // Render Department row
          html += `
            <tr class="tree-row tree-level-1" data-key="${deptKey}" style="font-weight: 700; background-color: rgba(138, 196, 63, 0.08); cursor: pointer;">
              <td><span class="tree-toggle">${deptIcon}</span> 📁 ${escapeHtml(deptName)}</td>
              <td class="${dept.overdueSum > 0 ? 'color-danger' : ''}">${dept.overdueSum}</td>
              <td class="${dept.efficiencySum < 0 ? 'color-danger' : (dept.efficiencySum > 0 ? 'color-success' : '')}">${dept.efficiencySum}</td>
            </tr>
          `;
          
          if (isDeptExpanded) {
            const employees = Object.keys(dept.employees).sort();
            employees.forEach((empName) => {
              const emp = dept.employees[empName];
              const empKey = `emp:${deptName}:${empName}`;
              const isEmpExpanded = state.expandedNodes.has(empKey);
              const empIcon = isEmpExpanded ? '▼' : '▶';
              
              // Render Employee row
              html += `
                <tr class="tree-row tree-level-2" data-key="${empKey}" style="font-weight: 600; background-color: rgba(233, 235, 232, 0.3); cursor: pointer;">
                  <td style="padding-left: 36px;"><span class="tree-toggle">${empIcon}</span> 👤 ${escapeHtml(empName)}</td>
                  <td class="${emp.overdueSum > 0 ? 'color-danger' : ''}">${emp.overdueSum}</td>
                  <td class="${emp.efficiencySum < 0 ? 'color-danger' : (emp.efficiencySum > 0 ? 'color-success' : '')}">${emp.efficiencySum}</td>
                </tr>
              `;
              
              if (isEmpExpanded) {
                emp.tasks.forEach((task) => {
                  let taskTitleHtml = escapeHtml(task.title);
                  if (state.portalHost && task.id) {
                    const idNum = String(task.id).replace('#', '').trim();
                    taskTitleHtml = `<a href="https://${state.portalHost}/company/personal/user/0/tasks/task/view/${idNum}/" target="_blank" class="task-link">#${idNum}</a> ${taskTitleHtml}`;
                  } else if (task.id) {
                    taskTitleHtml = `<span style="font-weight:700;">#${task.id}</span> ${taskTitleHtml}`;
                  }
                  
                  // Render Task row (leaf)
                  html += `
                    <tr class="tree-row tree-level-3">
                      <td style="padding-left: 64px; color: #555555;">📋 ${taskTitleHtml}</td>
                      <td class="${task.overdue > 0 ? 'color-danger' : ''}">${task.overdue}</td>
                      <td class="${task.efficiency < 0 ? 'color-danger' : (task.efficiency > 0 ? 'color-success' : '')}">${task.efficiency}</td>
                    </tr>
                  `;
                });
              }
            });
          }
        });
        
        ids.tableBody.innerHTML = html;
        ids.rowCount.textContent = state.filteredRows.length;
        ids.tableWrap.hidden = false;
        renderStats(state.filteredRows);
        
        // Attach click listeners to expand/collapse toggles
        document.querySelectorAll('.tree-row[data-key]').forEach((row) => {
          row.addEventListener('click', (e) => {
            if (e.target.tagName === 'A') return; // Don't collapse if clicked on task link
            
            const key = row.getAttribute('data-key');
            if (state.expandedNodes.has(key)) {
              state.expandedNodes.delete(key);
            } else {
              state.expandedNodes.add(key);
            }
            renderTable();
          });
        });
      }

      function escapeHtml(value) {
        return value
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#039;');
      }

      async function loadReport(method = 'GET') {
        ids.errorBox.hidden = true;
        ids.loadingBox.hidden = false;

        try {
          const response = await fetch(`/api/task-report?t=${Date.now()}`, {
            method,
            headers: {
              'Cache-Control': 'no-store',
              Pragma: 'no-cache'
            },
            cache: 'no-store'
          });

          const payload = await response.json();
          if (!response.ok || !payload.ok) {
            throw new Error(payload.error || 'Не удалось загрузить отчет');
          }

          state.columns = payload.columns;
          state.rows = payload.rows;
          state.filteredRows = payload.rows.slice();
          state.refreshIntervalMs = payload.refreshIntervalMs || state.refreshIntervalMs;
          state.portalHost = payload.portalHost || null;

          // Automatically expand all nodes by default
          state.expandedNodes.clear();
          state.filteredRows.forEach((row) => {
            const dept = row['Отдел'] || 'Без отдела';
            const assignee = row['Исполнитель'] || 'Без исполнителя';
            state.expandedNodes.add(`dept:${dept}`);
            state.expandedNodes.add(`emp:${dept}:${assignee}`);
          });

          ids.fetchedAt.textContent = formatDate(payload.fetchedAt);

          renderTable();
          scheduleRefresh();
        } catch (error) {
          ids.errorBox.hidden = false;
          ids.errorBox.textContent = error.message || 'Ошибка загрузки отчета';
        } finally {
          ids.loadingBox.hidden = true;
        }
      }

      function scheduleRefresh() {
        if (state.refreshTimer) {
          clearTimeout(state.refreshTimer);
        }

        state.refreshTimer = setTimeout(() => {
          loadReport('GET');
        }, state.refreshIntervalMs);
      }

      loadReport('GET');
    </script>
  </body>
</html>
