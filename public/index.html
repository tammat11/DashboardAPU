                const taskIcon = isImportant ? '🔥' : '📋';
                let taskTitleHtml = escapeHtml(task.title);
                if (state.portalHost && task.id) {
                  const idNum = String(task.id).replace('#', '').trim();
                  const linkStyle = isClosed ? 'color: #888888; border-bottom-color: rgba(136, 136, 136, 0.4); font-weight: 500;' : '';
                  taskTitleHtml = `<a href="https://${state.portalHost}/company/personal/user/0/tasks/task/view/${idNum}/" target="_blank" class="task-link" style="${linkStyle}">${taskTitleHtml}</a>`;
                }

                let projectPrefix = '';
                if (task.project && String(task.project).trim() !== '' && String(task.project).trim() !== '0') {
                  projectPrefix = `<span style="font-weight: 800; color: ${isClosed ? '#888' : 'var(--text-dark)'}; margin-right: 6px;">[${escapeHtml(task.project)}]</span>`;
                }

                let stateBadge = '';
                if (isClosed) {
                  stateBadge = ` <span style="font-size: 9px; padding: 2px 6px; border-radius: 4px; background: #e2e8f0; color: #475569; font-weight: 700; margin-left: 6px; vertical-align: middle; white-space: nowrap;">Закрыта</span>`;
                } else if (task.deadlineRaw) {
                  const deadlineDate = new Date(task.deadlineRaw);
                  if (!Number.isNaN(deadlineDate.getTime())) {
                    const now = new Date();
                    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                    const target = new Date(deadlineDate.getFullYear(), deadlineDate.getMonth(), deadlineDate.getDate());
                    const diffDays = Math.ceil((target - today) / (1000 * 60 * 60 * 24));
                    if (diffDays < 0) {
                      stateBadge = ` <span style="font-size: 9px; padding: 2px 6px; border-radius: 4px; background: #fee2e2; color: #ef4444; font-weight: 700; margin-left: 6px; vertical-align: middle; white-space: nowrap;">Просрочено</span>`;
                    } else if (diffDays === 0) {
                      stateBadge = ` <span style="font-size: 9px; padding: 2px 6px; border-radius: 4px; background: #ffedd5; color: #f97316; font-weight: 700; margin-left: 6px; vertical-align: middle; white-space: nowrap;">Дедлайн сегодня</span>`;
                    } else if (diffDays <= 3) {
                      stateBadge = ` <span style="font-size: 9px; padding: 2px 6px; border-radius: 4px; background: #fef9c3; color: #ca8a04; font-weight: 700; margin-left: 6px; vertical-align: middle; white-space: nowrap;">Скоро дедлайн</span>`;
                    }
                  }
                }

                const assigneeLabel = task.assignee ? `<span style="font-size: 10px; color: #6b9ef0; margin-left: 6px;">→ ${escapeHtml(formatShortName(task.assignee))}</span>` : '';
                const rowStyle = isClosed ? 'background-color: rgba(240, 240, 240, 0.3); color: #888888;' : 'background-color: rgba(99, 152, 240, 0.04);';
                const titleColor = isClosed ? 'color: #888888;' : 'color: #555555;';

                empHtml += `
                  <tr class="tree-row tree-level-4" style="${rowStyle}">
                    <td style="padding-left: ${68 + indentOffset}px; ${titleColor}">${taskIcon} ${projectPrefix}<span>${taskTitleHtml}</span>${stateBadge}${assigneeLabel}</td>
                    <td style="${isClosed ? 'color: #888888; white-space: normal; line-height: 1.25; font-size: 10.5px;' : ''}">
                      ${isClosed
                        ? `<div style="font-size: 9.5px; opacity: 0.8;">🏁 ${escapeHtml(removeYear(task.deadlineRaw, task.deadline))}</div><div style="font-weight: 600; margin-top: 1px;">✔️ ${escapeHtml(removeYear(task.closedDateRaw, task.closed))}</div>`
                        : escapeHtml(removeYear(task.deadlineRaw, task.deadline))
                      }
                    </td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td class="${task.overdue > 0 ? 'color-danger' : ''}" style="${isClosed ? 'opacity: 0.8;' : ''}">${task.overdue > 0 ? formatDays(task.overdue) : ''}</td>
                    <td style="${isClosed ? 'opacity: 0.8;' : ''}">${formatImportance(task.importance)}</td>
                    <td></td>
                  </tr>
                `;
              });
            }
          }

          return empHtml;
        };

        // Build departments maps for dynamic nesting walk-up
        const depById = {};
        const depByName = {};
        // Set of user IDs who are department heads (UF_HEAD)
        headUserIds = new Set();
        if (state.departments) {
          state.departments.forEach(d => {
            depById[String(d.ID)] = d;
            depByName[d.NAME] = d;
            if (d.UF_HEAD) headUserIds.add(String(d.UF_HEAD));
          });
        }

        // Map: employee display name → user ID (built from rows)
        const empNameToId = new Map();
        state.filteredRows.forEach(row => {
          const name = row['Исполнитель'];
          const id = String(row['ID исполнителя'] || '');
          if (name && id && !empNameToId.has(name)) empNameToId.set(name, id);
        });

        function isHead(empName) {
          const id = empNameToId.get(empName);
          return id && headUserIds.has(id);
        }

        // Helper to find parent-child relationship dynamically
        function getDeptGroupAndSub(deptName) {
          const chain = [];
          let current = depByName[deptName];
          while (current) {
            chain.push(current);
            if (current.PARENT) {
              current = depById[String(current.PARENT)];
            } else {
              current = null;
            }
          }
          
          // Top-level departments = direct children of АУП (ID: 157)
          // Аккаунты is a sub of УКС, so it must NOT be listed here
          const topLevelNames = ['УКС', 'ФУ', 'УРБ', 'АУ', 'I1C', 'ПС'];
          
          let topIndex = chain.findIndex(d => topLevelNames.includes(d.NAME));
          if (topIndex !== -1) {
            const topDept = chain[topIndex];
            if (topIndex === 0) {
              return { dept: topDept.NAME, subDept: null };
            } else {
              return { dept: topDept.NAME, subDept: deptName };
            }
          }
          
          if (chain.length > 1) {
            let idx = chain.length - 1;
            while (idx >= 0 && (chain[idx].ID === '1' || chain[idx].ID === '157' || chain[idx].NAME === 'IC Group' || chain[idx].NAME === 'АУП')) {
              idx--;
            }
            if (idx >= 0) {
              const topDeptName = chain[idx].NAME;
              if (topDeptName === deptName) {
                return { dept: deptName, subDept: null };
              } else {
                return { dept: topDeptName, subDept: deptName };
              }
            }
          }
          
          return { dept: deptName, subDept: null };
        }

        // Group the rows dynamically on client-side
        state.filteredRows.forEach((row) => {
          let dept = row['Отдел'] || 'Без отдела';
          const assignee = row['Исполнитель'] || 'Без исполнителя';
          if (isExcludedPerson(assignee)) return;
          const taskTitle = row['Название задачи'] || 'Без названия';
          
          const overdue = parseInt(row['Просрочка, дней']) || 0;
          // Балл за задачу = важность AI × доля за статус — как в рейтинге
          const efficiency = taskExecutorScore(row);

          let subDept = null;
          if (dept !== 'Без отдела') {
            const resolved = getDeptGroupAndSub(dept);
            dept = resolved.dept;
            subDept = resolved.subDept;
          }
          
          if (!tree[dept]) {
            tree[dept] = { 
              name: dept, 
              overdueSum: 0, 
              efficiencySum: 0, 
              employees: {},
              subDepts: {}
            };
          }
          tree[dept].overdueSum += overdue;
          tree[dept].efficiencySum += efficiency;
          
          const taskData = {
            id: row['ID задачи'],
            title: taskTitle,
            overdue: overdue,
            efficiency: efficiency,
            importance: row['AI важность'],
            creator: row['Постановщик'],
            priority: row['Приоритет'],
            deadline: row['Дедлайн'],
            deadlineRaw: row['deadlineRaw'],
            createdDateRaw: row['createdDateRaw'],
            created: row['Дата создания'],
            state: row['Состояние задачи'],
            closed: row['Дата закрытия'],
            closedDateRaw: row['closedDateRaw'],
            project: row['Проект']
          };

          if (subDept) {
            if (!tree[dept].subDepts[subDept]) {
              tree[dept].subDepts[subDept] = {
                name: subDept,
                overdueSum: 0,
                efficiencySum: 0,
                employees: {}
              };
            }
            tree[dept].subDepts[subDept].overdueSum += overdue;
            tree[dept].subDepts[subDept].efficiencySum += efficiency;
            
            if (!tree[dept].subDepts[subDept].employees[assignee]) {
              tree[dept].subDepts[subDept].employees[assignee] = {
                name: assignee,
                overdueSum: 0,
                efficiencySum: 0,
                tasks: []
              };
            }
            tree[dept].subDepts[subDept].employees[assignee].overdueSum += overdue;
            tree[dept].subDepts[subDept].employees[assignee].efficiencySum += efficiency;
            tree[dept].subDepts[subDept].employees[assignee].tasks.push(taskData);
          } else {
            if (!tree[dept].employees[assignee]) {
              tree[dept].employees[assignee] = {
                name: assignee,
                overdueSum: 0,
                efficiencySum: 0,
                tasks: []
              };
            }
            tree[dept].employees[assignee].overdueSum += overdue;
            tree[dept].employees[assignee].efficiencySum += efficiency;
            tree[dept].employees[assignee].tasks.push(taskData);
          }
        });

        // Second pass: add delegation bonus to the CREATOR's node (matches Rating/Gallery totals).
        // Own department = +1 per task; another department = +round(0.5 * importance).
        state.filteredRows.forEach((row) => {
          const creatorName = row['Постановщик'];
          if (!creatorName || creatorName === 'Без постановщика') return;
          if (isExcludedPerson(creatorName)) return;
          // Нельзя «поручить» задачу самому себе — ни бонуса, ни папки «Порученные»
          const creatorId = String(row['ID постановщика'] || '');
          if (creatorId && String(row['ID исполнителя'] || '') === creatorId) return;
          let cDept = row['Отдел постановщика'] || 'Без отдела';
          const execDept = row['Отдел'] || 'Без отдела';
          const V = parseFloat(row['AI важность']) || 0;
          const bonus = (cDept !== execDept) ? Math.round(0.5 * V) : 1;

          let cSub = null;
          if (cDept !== 'Без отдела') {
            const r = getDeptGroupAndSub(cDept);
            cDept = r.dept;
            cSub = r.subDept;
          }
          if (!tree[cDept]) {
            tree[cDept] = { name: cDept, overdueSum: 0, efficiencySum: 0, employees: {}, subDepts: {} };
          }
          if (bonus) tree[cDept].efficiencySum += bonus;

          const delegTaskData = {
            id: row['ID задачи'],
            title: row['Название задачи'] || 'Без названия',
            assignee: row['Исполнитель'] || '',
            assigneeDept: execDept,
            state: row['Состояние задачи'],
            deadline: row['Дедлайн'],
            deadlineRaw: row['deadlineRaw'],
            closed: row['Дата закрытия'],
            closedDateRaw: row['closedDateRaw'],
            importance: row['AI важность'],
            overdue: parseInt(row['Просрочка, дней']) || 0,
            project: row['Проект'],
            priority: row['Приоритет'],
          };

          const ensureEmp = (map) => {
            if (!map[creatorName]) map[creatorName] = { name: creatorName, overdueSum: 0, efficiencySum: 0, tasks: [], delegationBonus: 0, delegatedTasks: [] };
            if (!map[creatorName].delegatedTasks) map[creatorName].delegatedTasks = [];
            if (bonus) {
              map[creatorName].efficiencySum += bonus;
              map[creatorName].delegationBonus = (map[creatorName].delegationBonus || 0) + bonus;
            }
            map[creatorName].delegatedTasks.push(delegTaskData);
          };
          if (cSub) {
            if (!tree[cDept].subDepts[cSub]) tree[cDept].subDepts[cSub] = { name: cSub, overdueSum: 0, efficiencySum: 0, employees: {} };
            if (bonus) tree[cDept].subDepts[cSub].efficiencySum += bonus;
            ensureEmp(tree[cDept].subDepts[cSub].employees);
          } else {
            ensureEmp(tree[cDept].employees);
          }
        });

        // Set columns headers
        const headers = ['Структура (Отдел → Исполнитель → Задача)', 'Дедлайн / Вып.', 'Поручил', 'Кол-во задач', 'В работе', 'Просрочка, дн.', 'Важность', 'Баллы'];
        ids.tableHead.innerHTML = headers.map(h => `<th>${h}</th>`).join('');

        let html = '';
        const depts = Object.keys(tree).sort();
        
        if (depts.length === 0) {
          ids.tableBody.innerHTML = `<tr><td colspan="8" style="text-align:center;color:var(--text-muted);padding:24px;">Нет данных для группировки</td></tr>`;
          return;
        }
        
        depts.forEach((deptName) => {
          const dept = tree[deptName];
          const deptKey = `dept:${deptName}`;
          const isDeptExpanded = state.expandedNodes.has(deptKey);
          const deptIcon = isDeptExpanded ? '▼' : '▶';
          
          // Calculate Department tasks count (including sub-departments)
          let deptTasksCount = 0;
          let deptActiveCount = 0;
          Object.values(dept.employees).forEach(emp => {
            deptTasksCount += emp.tasks.length;
            deptActiveCount += emp.tasks.filter(t => !(t.state && t.state.startsWith('Закрыта'))).length;
          });
          if (dept.subDepts) {
            Object.values(dept.subDepts).forEach(sub => {
              Object.values(sub.employees).forEach(emp => {
                deptTasksCount += emp.tasks.length;
                deptActiveCount += emp.tasks.filter(t => !(t.state && t.state.startsWith('Закрыта'))).length;
              });
            });
          }
          
          // Render Department row
          html += `
            <tr class="tree-row tree-level-1" data-key="${deptKey}" style="font-weight: 700; background-color: rgba(138, 196, 63, 0.08); cursor: pointer;">
              <td><span class="tree-toggle">${deptIcon}</span> 📁 ${escapeHtml(deptName)}${formatDeptCrossAssignments(deptName)}</td>
              <td></td>
              <td></td>
              <td>${formatTasks(deptTasksCount)}</td>
              <td>${formatTasks(deptActiveCount)}</td>
              <td class="${dept.overdueSum > 0 ? 'color-danger' : ''}">${formatDays(dept.overdueSum)}</td>
              <td style="color:var(--text-muted);">—</td>
              <td class="${dept.efficiencySum < 0 ? 'color-danger' : (dept.efficiencySum > 0 ? 'color-success' : '')}">${formatPoints(dept.efficiencySum)}</td>
            </tr>
          `;
          
          if (isDeptExpanded) {
            // 1. Render sub-departments under this department
            if (dept.subDepts) {
              const subDeptsNames = Object.keys(dept.subDepts).sort();
              subDeptsNames.forEach((subDeptName) => {
                const subDept = dept.subDepts[subDeptName];
                const subDeptKey = `subdept:${deptName}:${subDeptName}`;
                const isSubExpanded = state.expandedNodes.has(subDeptKey);
                const subIcon = isSubExpanded ? '▼' : '▶';
                
                let subTasksCount = 0;
                let subActiveCount = 0;
                Object.values(subDept.employees).forEach(emp => {
                  subTasksCount += emp.tasks.length;
                  subActiveCount += emp.tasks.filter(t => !(t.state && t.state.startsWith('Закрыта'))).length;
                });
                
                // Render Sub-department row (Level 1.5, uses tree-level-2 styling)
                html += `
                  <tr class="tree-row tree-level-2" data-key="${subDeptKey}" style="font-weight: 800; background-color: rgba(138, 196, 63, 0.04); cursor: pointer;">
                    <td style="padding-left: 28px;"><span class="tree-toggle">${subIcon}</span> 📁 ${escapeHtml(subDeptName)}</td>
                    <td></td>
                    <td></td>
                    <td>${formatTasks(subTasksCount)}</td>
                    <td>${formatTasks(subActiveCount)}</td>
                    <td class="${subDept.overdueSum > 0 ? 'color-danger' : ''}">${formatDays(subDept.overdueSum)}</td>
                    <td style="color:var(--text-muted);">—</td>
                    <td class="${subDept.efficiencySum < 0 ? 'color-danger' : (subDept.efficiencySum > 0 ? 'color-success' : '')}">${formatPoints(subDept.efficiencySum)}</td>
                  </tr>
                `;
                
                if (isSubExpanded) {
                  const subEmployees = Object.keys(subDept.employees).sort();
                  subEmployees.forEach((empName) => {
                    const emp = subDept.employees[empName];
                    const empKey = `emp:${deptName}:${subDeptName}:${empName}`;
                    const isEmpExpanded = state.expandedNodes.has(empKey);
                    const empIcon = isEmpExpanded ? '▼' : '▶';
                    
                    const empTasksCount = emp.tasks.length;
                    const empActiveCount = emp.tasks.filter(t => !(t.state && t.state.startsWith('Закрыта'))).length;
                    const isEmpHead2 = isHead(empName);
                    
                    // Render Employee row under sub-department
                    html += `
                      <tr class="tree-row tree-level-2" data-key="${empKey}" style="font-weight: 800; background-color: rgba(233, 235, 232, 0.3); cursor: pointer;">
                        <td style="padding-left: 56px;"><span class="tree-toggle">${empIcon}</span> 👤 ${escapeHtml(empName)}${formatEmpCrossAssignments(empName)}</td>
                        <td></td>
                        <td></td>
                        <td>${formatTasks(empTasksCount)}</td>
                        <td>${formatTasks(empActiveCount)}</td>
                        <td class="${emp.overdueSum > 0 ? 'color-danger' : ''}">${formatDays(emp.overdueSum)}</td>
                        <td>${avgImportance(emp.tasks)}</td>
                        <td class="${emp.efficiencySum < 0 ? 'color-danger' : (emp.efficiencySum > 0 ? 'color-success' : '')}">${formatPoints(emp.efficiencySum)}</td>
                      </tr>
                    `;
                    
                    if (isEmpExpanded) {
                      html += renderEmployeeTasks(emp, `${deptName}:${subDeptName}`, empName, 28);
                    }
                  });
                }
              });
            }

            // 2. Render direct employees of this department
            const employees = Object.keys(dept.employees).sort();
            employees.forEach((empName) => {
              const emp = dept.employees[empName];
              const empKey = `emp:${deptName}:${empName}`;
              const isEmpExpanded = state.expandedNodes.has(empKey);
              const empIcon = isEmpExpanded ? '▼' : '▶';
              
              const empTasksCount = emp.tasks.length;
              const empActiveCount = emp.tasks.filter(t => !(t.state && t.state.startsWith('Закрыта'))).length;
              const isEmpHead = isHead(empName);
              
              // Render Employee row
              html += `
                <tr class="tree-row tree-level-2" data-key="${empKey}" style="font-weight: 800; background-color: rgba(233, 235, 232, 0.3); cursor: pointer;">
                  <td style="padding-left: 28px;"><span class="tree-toggle">${empIcon}</span> 👤 ${escapeHtml(empName)}${formatEmpCrossAssignments(empName)}</td>
                  <td></td>
                  <td></td>
                  <td>${formatTasks(empTasksCount)}</td>
                  <td>${formatTasks(empActiveCount)}</td>
                  <td class="${emp.overdueSum > 0 ? 'color-danger' : ''}">${formatDays(emp.overdueSum)}</td>
                  <td>${avgImportance(emp.tasks)}</td>
                  <td class="${emp.efficiencySum < 0 ? 'color-danger' : (emp.efficiencySum > 0 ? 'color-success' : '')}">${formatPoints(emp.efficiencySum)}</td>
                </tr>
              `;
              
              if (isEmpExpanded) {
                html += renderEmployeeTasks(emp, deptName, empName, 0);
              }
            });
          }
        });
        
        ids.tableBody.innerHTML = html;
        ids.rowCount.textContent = state.filteredRows.length;
        ids.tableWrap.hidden = false;
        renderStats(state.filteredRows);
        
        // Attach click listeners to expand/collapse toggles
        document.querySelectorAll('.tree-row[data-key]').forEach((row) => {
          row.addEventListener('click', (e) => {
            if (e.target.tagName === 'A') return; // Don't collapse if clicked on task link
            
            const key = row.getAttribute('data-key');
            if (state.expandedNodes.has(key)) {
              state.expandedNodes.delete(key);
            } else {
              state.expandedNodes.add(key);
            }
            renderTable();
          });
        });

        const table = document.querySelector('table');
        if (table && state.viewMode === 'table1') {
          let hasExpandedEmp = false;
          for (const key of state.expandedNodes) {
            if (key.startsWith('emp:')) {
              hasExpandedEmp = true;
              break;
            }
          }
          if (hasExpandedEmp) {
            table.classList.remove('hide-task-details');
          } else {
            table.classList.add('hide-task-details');
          }
        } else if (table) {
          table.classList.remove('hide-task-details');
        }

      }

      function escapeHtml(value) {
        return value
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#039;');
      }

      function applyFilters() {
        const period = ids.periodSelect ? ids.periodSelect.value : 'all';
        const now = new Date();
        
        let filtered = state.rows.slice();

        // Keep only АУП (ID: 157) and its descendants in the department structure
        if (state.departments && state.departments.length > 0) {
          const allowedDeptIds = new Set(['157']);
          let added = true;
          while (added) {
            added = false;
            state.departments.forEach(d => {
              const parentId = String(d.PARENT || '');
              const id = String(d.ID);
              if (parentId && allowedDeptIds.has(parentId) && !allowedDeptIds.has(id)) {
                allowedDeptIds.add(id);
                added = true;
              }
            });
          }
          const allowedDeptNames = new Set();
          state.departments.forEach(d => {
            if (allowedDeptIds.has(String(d.ID))) {
              allowedDeptNames.add(d.NAME);
            }
          });
          filtered = filtered.filter(row => allowedDeptNames.has(row['Отдел']));
        }
        
        if (period !== 'all') {
          // Prepare period boundaries in user's browser local time
          const startToday = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 0, 0, 0);
          const endToday = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23, 59, 59, 999);

          const day = now.getDay();
          const diffToMonday = now.getDate() - day + (day === 0 ? -6 : 1);
          const startWeek = new Date(now.getFullYear(), now.getMonth(), diffToMonday, 0, 0, 0, 0);
          const endWeek = new Date(startWeek.getTime() + 7 * 24 * 60 * 60 * 1000 - 1);

          const startMonth = new Date(now.getFullYear(), now.getMonth(), 1, 0, 0, 0, 0);
          const endMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0, 23, 59, 59, 999);

          const startLastMonth = new Date(now.getFullYear(), now.getMonth() - 1, 1, 0, 0, 0, 0);
          const endLastMonth = new Date(now.getFullYear(), now.getMonth(), 0, 23, 59, 59, 999);

          let start, end;
          if (period === 'today') {
            start = startToday;
            end = endToday;
          } else if (period === 'week') {
            start = startWeek;
            end = endWeek;
          } else if (period === 'month') {
            start = startMonth;
            end = endMonth;
          } else if (period === 'lastMonth') {
            start = startLastMonth;
            end = endLastMonth;
          }

          filtered = state.rows.filter((row) => {
            const parseDate = (rawKey, strKey) => {
              if (row[rawKey]) {
                const d = new Date(row[rawKey]);
                if (!Number.isNaN(d.getTime())) return d;
              }
              return parseDateStr(row[strKey]);
            };

            const created = parseDate('createdDateRaw', 'Дата создания');
            const deadline = parseDate('deadlineRaw', 'Дедлайн');
            const closed = parseDate('closedDateRaw', 'Дата закрытия');

            const isDeadlineIn = deadline && deadline >= start && deadline <= end;

            return isDeadlineIn;
          });
        }
        
        // Apply name search filter
        const q = state.searchQuery.toLowerCase().trim();
        if (q) {
          const matchedPeople = new Set();
          filtered.forEach(row => {
            const executor = (row['Исполнитель'] || '').toLowerCase();
            const creator = (row['Постановщик'] || '').toLowerCase();
            if (executor.includes(q)) matchedPeople.add(row['Исполнитель']);
            if (creator.includes(q)) matchedPeople.add(row['Постановщик']);
          });
          filtered = filtered.filter(row => matchedPeople.has(row['Исполнитель']) || matchedPeople.has(row['Постановщик']));
        }

        state.filteredRows = filtered;
        
        // We do NOT clear/re-populate state.expandedNodes here anymore.
        // This ensures the tree starts collapsed by default initially,
        // and preserves manual expanded states when filters are changed or auto-refreshed.
        
        renderTable();
      }

      function isTvBrowser() {
        const ua = String(navigator.userAgent || '');
        return /SmartTV|Tizen|Web0S|WebOS|NetCast|HbbTV|TV\b/i.test(ua);
      }

      // Smart TV browsers are more stable with plain XHR than with fetch.
      function requestReportXHR(method) {
        return new Promise((resolve, reject) => {
          try {
            const xhr = new XMLHttpRequest();
            xhr.open(method, `/api/task-report?t=${Date.now()}`, true);
            xhr.timeout = 55000;
            xhr.setRequestHeader('Accept', 'application/json');
            xhr.setRequestHeader('Cache-Control', 'no-store');
            xhr.setRequestHeader('Pragma', 'no-cache');
            xhr.onload = () => {
              if (xhr.status < 200 || xhr.status >= 300) {
                try {
                  const errorPayload = JSON.parse(xhr.responseText || '{}');
                  reject(new Error(errorPayload.error || `Ошибка сервера ${xhr.status}`));
                } catch (e) {
                  reject(new Error(`Ошибка сервера ${xhr.status}`));
                }
                return;
              }
              try {
                const data = JSON.parse(xhr.responseText || '{}');
                resolve(data);
              } catch (e) {
                reject(new Error('Некорректный ответ сервера'));
              }
            };
            xhr.onerror = () => reject(new Error('Нет связи с сервером'));
            xhr.ontimeout = () => reject(new Error('Превышено время ожидания'));
            xhr.send();
          } catch (e) {
            reject(e);
          }
        });
      }

      // Prefer XHR on TVs, otherwise fall back to it when fetch breaks at network layer.
      async function requestReport(method) {
        if (isTvBrowser() || typeof fetch !== 'function') {
          return requestReportXHR(method);
        }

        const url = `/api/task-report?t=${Date.now()}`;
        try {
          const response = await fetch(url, { method });
          return await response.json();
        } catch (e) {
          return requestReportXHR(method);
        }
      }

      // Normalize AI importance (value 1-10) to a 0-5 score added on top of status points
      function normalizeImportance(value) {
        const v = parseFloat(value);
        if (!v || isNaN(v)) return 0;
        if (v <= 3) return 0;       // нет ценности
        if (v <= 6) return 2.5;     // средняя ценность
        return 5;                   // критично/ценно
      }

      let aiScoresCache = null;
      async function mergeAiScores() {
        try {
          if (!aiScoresCache) {
            const resp = await fetch('/ai-scores.json', { cache: 'no-store' });
            aiScoresCache = resp.ok ? await resp.json() : {};
          }
        } catch { aiScoresCache = {}; }

        state.rows.forEach(row => {
          const id = String(row['ID задачи']);
          const ai = aiScoresCache[id];
          if (ai && ai.value != null) {
            row['AI важность'] = ai.value;
            row['AI важность (0-5)'] = normalizeImportance(ai.value);
            row['AI рекомендация'] = ai.recommendation || '';
          } else {
            row['AI важность'] = null;
            row['AI важность (0-5)'] = 0;
            row['AI рекомендация'] = '';
          }
        });
      }

      async function loadReport(method = 'GET') {
        ids.errorBox.hidden = true;
        
        const isFirstLoad = state.rows.length === 0;
        if (isFirstLoad) {
          ids.loadingBox.hidden = false;
          ids.tableWrap.hidden = true;
          ids.galleryWrap.hidden = true;
        } else {
          if (ids.syncIndicator) ids.syncIndicator.hidden = false;
        }
        
        if (ids.refreshBtn) ids.refreshBtn.disabled = true;

        try {
          const payload = await requestReport(method);
          if (!payload.ok) {
            throw new Error(payload.error || 'Не удалось загрузить отчет');
          }

          state.columns = payload.columns;
          state.rows = payload.rows;
          await mergeAiScores();
          state.departments = payload.departments || [];
          state.refreshIntervalMs = payload.refreshIntervalMs || state.refreshIntervalMs;
          state.portalHost = payload.portalHost || null;

          ids.fetchedAt.textContent = formatDate(payload.fetchedAt);

          applyFilters();
          scheduleRefresh();
        } catch (error) {
          ids.errorBox.hidden = false;
          ids.errorBox.textContent = error.message || 'Ошибка загрузки отчета';
        } finally {
          ids.loadingBox.hidden = true;
          if (ids.syncIndicator) ids.syncIndicator.hidden = true;
          if (ids.refreshBtn) ids.refreshBtn.disabled = false;
        }
      }

      function scheduleRefresh() {
        if (state.refreshTimer) {
          clearTimeout(state.refreshTimer);
        }

        state.refreshTimer = setTimeout(() => {
          loadReport('GET');
        }, state.refreshIntervalMs);
      }

      if (ids.refreshBtn) {
        ids.refreshBtn.addEventListener('click', () => loadReport('POST'));
      }

      if (ids.periodSelect) {
        // Dynamically set actual names for current and previous months
        const now = new Date();
        const monthNames = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
        const currentMonthName = monthNames[now.getMonth()];
        const prevMonthName = monthNames[(now.getMonth() + 11) % 12];
        
        const monthOpt = ids.periodSelect.querySelector('option[value="month"]');
        if (monthOpt) monthOpt.textContent = currentMonthName;
        
        const lastMonthOpt = ids.periodSelect.querySelector('option[value="lastMonth"]');
        if (lastMonthOpt) lastMonthOpt.textContent = prevMonthName;

        // Restore saved period preference
        let savedPeriod = localStorage.getItem('dashboard_period');
        // Migrate old default 'all' (Все время) to new default 'month' (Июнь)
        if (savedPeriod === 'all' || !savedPeriod) {
          savedPeriod = 'month';
          localStorage.setItem('dashboard_period', 'month');
        }
        
        ids.periodSelect.value = savedPeriod;
        
        ids.periodSelect.addEventListener('change', () => {
          applyFilters();
          localStorage.setItem('dashboard_period', ids.periodSelect.value);
        });
      }

      // Search input with 200ms debounce
      if (ids.searchInput) {
        let searchTimer = null;
        ids.searchInput.addEventListener('input', () => {
          clearTimeout(searchTimer);
          const val = ids.searchInput.value;
          ids.searchClear.classList.toggle('visible', val.length > 0);
          searchTimer = setTimeout(() => {
            state.searchQuery = val;
            applyFilters();
          }, 200);
        });
        ids.searchClear.addEventListener('click', () => {
          ids.searchInput.value = '';
          ids.searchClear.classList.remove('visible');
          state.searchQuery = '';
          applyFilters();
          ids.searchInput.focus();
        });
      }

      // View switcher
      function setView(mode) {
        state.viewMode = mode;
        ids.viewBtn1.classList.toggle('active', mode === 'table1');
        ids.viewBtn2.classList.toggle('active', mode === 'table2');
        ids.viewBtn3.classList.toggle('active', mode === 'table3');
        ids.viewBtn4.classList.toggle('active', mode === 'table4');
        if (ids.viewBtn5) ids.viewBtn5.classList.toggle('active', mode === 'table5');
        renderTable();
      }
      if (ids.viewBtn1) ids.viewBtn1.addEventListener('click', () => setView('table1'));
      if (ids.viewBtn2) ids.viewBtn2.addEventListener('click', () => setView('table2'));
      if (ids.viewBtn3) ids.viewBtn3.addEventListener('click', () => setView('table3'));
      if (ids.viewBtn4) ids.viewBtn4.addEventListener('click', () => setView('table4'));
      if (ids.viewBtn5) ids.viewBtn5.addEventListener('click', () => setView('table5'));

      loadReport('GET');


    </script>
  </body>
</html>
